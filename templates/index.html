<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --pk-dark: #202020; --pk-light: #f8f8f8; --pk-green: #38b000; }
        body { background-color: #8c8c8c; font-family: 'VT323', monospace; display: flex; justify-content: center; padding: 20px; }
        #game-container { width: 450px; background: var(--pk-light); border: 6px solid var(--pk-dark); border-radius: 10px; padding: 15px; }
        .screen { background-color: #e0f8d0; border: 3px solid var(--pk-dark); padding: 10px; min-height: 150px; margin-bottom: 10px; }
        .skill-box { border: 2px solid var(--pk-dark); margin: 5px 0; padding: 8px; background: rgba(255,255,255,0.5); display: flex; justify-content: space-between; align-items: center; }
        .locked { background: #b0b0b0; opacity: 0.7; }
        button { font-family: 'VT323'; border: 2px solid var(--pk-dark); cursor: pointer; background: #fff; }
        button:hover { background: var(--pk-dark); color: #fff; }
        #log { border: 3px double var(--pk-dark); padding: 10px; background: #fff; height: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>
<div id="game-container">
    <h2 style="text-align:center; margin-top:0;">HABILIDADES RPG</h2>
    <div class="screen" id="skill-tree">
        <div class="skill-box">
            <span>CORTE (Nvl <span id="nvl-1">3</span>)</span>
            <button onclick="subirHabilidad(1)">SUBIR</button>
        </div>
        <div class="skill-box locked">
            <span>TORBELLINO (Req. Corte Nvl 3)</span>
            <button onclick="subirHabilidad(2)">DESBLOQUEAR</button>
        </div>
    </div>
    <div id="log">Bienvenido, viajero. Pulsa un botón para entrenar.</div>
</div>
<script>
    const socket = io();
    function subirHabilidad(id) { socket.emit('mejorar_habilidad', {id: id}); }
    socket.on('status', (data) => { document.getElementById('log').innerText = "> " + data.msg; });
</script>
</body>
</html>

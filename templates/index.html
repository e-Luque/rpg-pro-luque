<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --pk-dark: #202020;
            --pk-light: #f8f8f8;
            --pk-green: #38b000;
            --pk-yellow: #f2c94c;
            --pk-red: #d62828;
            --gba-shell: #6f72d8;
            --gba-shell-dark: #3d3f8f;
            --gba-screen: #c8f0a8;
            --gba-screen-dark: #7aa05b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(135deg, #686868 25%, transparent 25%) -12px 0,
                linear-gradient(225deg, #686868 25%, transparent 25%) -12px 0,
                linear-gradient(315deg, #686868 25%, transparent 25%),
                linear-gradient(45deg, #686868 25%, #7d7d7d 25%);
            background-size: 24px 24px;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            padding: 28px 14px;
            color: var(--pk-dark);
        }
        #game-container {
            width: min(760px, 100%);
            background: var(--gba-shell);
            border: 6px solid var(--pk-dark);
            border-radius: 18px 18px 44px 18px;
            padding: 22px;
            box-shadow: 10px 10px 0 var(--gba-shell-dark), 16px 16px 0 rgba(0,0,0,0.35);
        }
        h2 {
            background: var(--pk-light);
            border: 4px solid var(--pk-dark);
            padding: 8px;
            margin-bottom: 12px !important;
            box-shadow: 4px 4px 0 var(--gba-shell-dark);
        }
        h3 { font-size: 1.45rem; }
        .status-panel {
            border: 4px solid var(--pk-dark);
            background: #f8f8f8;
            padding: 10px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            box-shadow: 4px 4px 0 var(--gba-shell-dark);
        }
        .status-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 1.25rem; }
        .status-label { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 12px; height: 12px; border: 2px solid var(--pk-dark); background: var(--pk-yellow); display: inline-block; }
        .status-value { text-align: right; }
        .status-ok .status-dot { background: var(--pk-green); }
        .status-error .status-dot { background: var(--pk-red); }
        .status-wait .status-dot { background: var(--pk-yellow); }
        .tabs { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
        .tab.active { background: var(--pk-dark); color: #fff; transform: translate(2px, 2px); box-shadow: none; }
        .tab-panel.hidden { display: none; }
        .skill-toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 6px;
            margin: 0 6px 10px;
        }
        .skill-toolbar label {
            display: grid;
            gap: 4px;
            font-size: 1.2rem;
        }
        select {
            width: 100%;
            min-height: 40px;
            border: 3px solid var(--pk-dark);
            background: #fff;
            font-family: 'VT323';
            font-size: 1.15rem;
            padding: 4px 8px;
            box-shadow: 3px 3px 0 var(--gba-shell-dark);
        }
        .screen {
            background: var(--gba-screen);
            border: 6px solid var(--pk-dark);
            outline: 6px solid #5b5b5b;
            padding: 14px;
            min-height: 330px;
            max-height: 460px;
            overflow-y: auto;
            margin: 8px 6px 18px;
            box-shadow: inset 0 0 0 4px var(--gba-screen-dark);
        }
        .skill-box,
        .character-box,
        .item-box {
            border: 3px solid var(--pk-dark);
            margin: 8px 0;
            padding: 10px;
            background: rgba(248,248,248,0.82);
            box-shadow: 3px 3px 0 rgba(32,32,32,0.3);
        }
        .skill-box { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .character-name,
        .item-title { display: flex; justify-content: space-between; gap: 8px; font-size: 1.35rem; }
        .character-stats { margin-top: 6px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 4px 12px; font-size: 1.16rem; }
        .shop-message {
            border: 3px solid var(--pk-dark);
            background: var(--pk-yellow);
            padding: 10px;
            margin: 0 6px 10px;
            font-size: 1.25rem;
            box-shadow: 3px 3px 0 var(--gba-shell-dark);
        }
        .item-info { margin-top: 6px; font-size: 1.16rem; }
        .item-box button { margin-top: 8px; width: 100%; cursor: not-allowed; background: #d0d0d0; color: #555; }
        .skill-info { margin-top: 6px; font-size: 1.12rem; }
        .skill-status { font-size: 1.2rem; white-space: nowrap; }
        .locked { background: #b0b0b0; opacity: 0.7; }
        button {
            font-family: 'VT323';
            border: 3px solid var(--pk-dark);
            cursor: pointer;
            background: #fff;
            min-height: 38px;
            padding: 4px 12px;
            font-size: 1.15rem;
            box-shadow: 3px 3px 0 var(--gba-shell-dark);
        }
        button:hover { background: var(--pk-dark); color: #fff; }
        #log {
            border: 4px double var(--pk-dark);
            padding: 12px;
            background: #fff;
            min-height: 62px;
            font-size: 1.3rem;
            box-shadow: 4px 4px 0 var(--gba-shell-dark);
        }
        @media (max-width: 640px) {
            #game-container { padding: 14px; border-radius: 14px 14px 30px 14px; }
            .status-panel,
            .tabs,
            .character-stats { grid-template-columns: 1fr; }
            .screen { min-height: 280px; margin-left: 0; margin-right: 0; }
        }
    </style>
</head>
<body>
<div id="game-container">
    <h2 style="text-align:center; margin-top:0;">HABILIDADES RPG</h2>
    <div class="status-panel" aria-label="Estado del sistema">
        <div class="status-row status-wait" id="server-status">
            <span class="status-label"><span class="status-dot"></span>Servidor</span>
            <span class="status-value" id="server-status-text">Conectando...</span>
        </div>
        <div class="status-row status-wait" id="db-status">
            <span class="status-label"><span class="status-dot"></span>Base de datos</span>
            <span class="status-value" id="db-status-text">Sin comprobar</span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="habilidades">Habilidades</button>
        <button class="tab" data-tab="personajes">Personajes</button>
        <button class="tab" data-tab="tienda">Tienda</button>
    </div>

    <div class="tab-panel" id="habilidades-panel">
        <div class="skill-toolbar">
            <label>
                Personaje para el árbol
                <select id="skill-personaje-select" onchange="seleccionarPersonajeHabilidades(this.value)">
                    <option value="">Cargando personajes...</option>
                </select>
            </label>
            <div class="shop-message" id="skill-character-message">Escoge un personaje para entrenar sus habilidades.</div>
        </div>
        <div class="screen" id="skill-tree">
            <div class="skill-box">Cargando habilidades...</div>
        </div>
    </div>

    <div class="tab-panel hidden" id="personajes-panel">
        <h3 style="margin: 0 0 8px;">PERSONAJES</h3>
        <div class="screen" id="characters-list">
            <div class="character-box">Cargando personajes...</div>
        </div>
    </div>

    <div class="tab-panel hidden" id="tienda-panel">
        <h3 style="margin: 0 0 8px;">TIENDA</h3>
        <div class="shop-message">Comprar no está disponible todavía.</div>
        <div class="screen" id="items-list">
            <div class="item-box">Cargando items...</div>
        </div>
    </div>

    <div id="log">Bienvenido, viajero. Pulsa un botón para entrenar.</div>
</div>
<script>
    const socket = io();
    let idPersonaje = 1;
    const serverStatus = document.getElementById('server-status');
    const serverStatusText = document.getElementById('server-status-text');
    const dbStatus = document.getElementById('db-status');
    const dbStatusText = document.getElementById('db-status-text');

    function setStatus(element, textElement, state, text) {
        element.classList.remove('status-ok', 'status-error', 'status-wait');
        element.classList.add(`status-${state}`);
        textElement.innerText = text;
    }

    function setDatabaseStatus(state, text) {
        setStatus(dbStatus, dbStatusText, state, text);
    }

    function subirHabilidad(idHabilidad) {
        setDatabaseStatus('wait', 'Consultando...');
        socket.emit('mejorar_habilidad', {
            id_personaje: idPersonaje,
            id_habilidad: idHabilidad
        });
    }

    function seleccionarPersonajeHabilidades(idSeleccionado) {
        idPersonaje = Number(idSeleccionado) || 1;
        const select = document.getElementById('skill-personaje-select');
        const nombre = select.options[select.selectedIndex]?.text || `Personaje ${idPersonaje}`;
        document.getElementById('skill-character-message').innerText = `Árbol de habilidades de ${nombre}.`;
        document.getElementById('log').innerText = `> Personaje activo: ${nombre}`;
        cargarArbolHabilidades();
    }

    async function cargarArbolHabilidades() {
        const container = document.getElementById('skill-tree');
        container.innerHTML = '<div class="skill-box">Cargando habilidades...</div>';
        setDatabaseStatus('wait', 'Consultando...');

        try {
            const response = await fetch(`/api/habilidades/${idPersonaje}`);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            const habilidades = data.habilidades || [];
            setDatabaseStatus('ok', 'Operativa');

            if (habilidades.length === 0) {
                container.innerHTML = '<div class="skill-box">Este personaje no tiene habilidades disponibles.</div>';
                return;
            }

            container.innerHTML = habilidades.map((habilidad) => {
                const requisitos = habilidad.requisitos.length
                    ? habilidad.requisitos.map((req) => `${req.nombre} ${req.nivel_actual}/${req.nivel_necesario}`).join(', ')
                    : 'Sin requisitos';
                const estado = habilidad.nivel_actual >= habilidad.nivel_maximo
                    ? 'MAX'
                    : habilidad.desbloqueada
                        ? 'OK'
                        : 'LOCK';

                return `
                    <div class="skill-box ${habilidad.desbloqueada ? '' : 'locked'}">
                        <div>
                            <div class="character-name">
                                <strong>${habilidad.nombre}</strong>
                                <span class="skill-status">${estado}</span>
                            </div>
                            <div class="skill-info">${habilidad.clase} / ${habilidad.tipo} / Nivel ${habilidad.nivel_actual}/${habilidad.nivel_maximo}</div>
                            <div class="skill-info">Req: ${requisitos}</div>
                            <div class="skill-info">${habilidad.descripcion || ''}</div>
                        </div>
                        <button onclick="subirHabilidad(${habilidad.id})" ${habilidad.puede_subir ? '' : 'disabled'}>
                            SUBIR
                        </button>
                    </div>
                `;
            }).join('');
        } catch (error) {
            setDatabaseStatus('error', 'Error');
            container.innerHTML = `<div class="skill-box">No se pudieron cargar habilidades: ${error.message}</div>`;
        }
    }

    async function cargarPersonajes() {
        const container = document.getElementById('characters-list');
        const skillSelect = document.getElementById('skill-personaje-select');
        setDatabaseStatus('wait', 'Consultando...');

        try {
            const response = await fetch('/api/personajes');
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const personajes = await response.json();
            setDatabaseStatus('ok', 'Operativa');

            if (personajes.length === 0) {
                container.innerHTML = '<div class="character-box">No hay personajes.</div>';
                skillSelect.innerHTML = '<option value="">No hay personajes</option>';
                return;
            }

            skillSelect.innerHTML = personajes.map((personaje) => `
                <option value="${personaje.id}">${personaje.nombre} - Nv ${personaje.nivel}</option>
            `).join('');

            idPersonaje = personajes[0].id;
            skillSelect.value = idPersonaje;
            document.getElementById('skill-character-message').innerText = `Árbol de habilidades de ${personajes[0].nombre} - Nv ${personajes[0].nivel}.`;
            cargarArbolHabilidades();

            container.innerHTML = personajes.map((personaje) => `
                <div class="character-box">
                    <div class="character-name">
                        <strong>${personaje.nombre}</strong>
                        <span>Nv ${personaje.nivel}</span>
                    </div>
                    <div class="character-stats">
                        <span>Vida: ${personaje.vida_actual}</span>
                        <span>EXP: ${personaje.exp}</span>
                        <span>Oro: ${personaje.oro}</span>
                        <span>Raza ID: ${personaje.id_raza || '-'}</span>
                        <span>Clase ID: ${personaje.id_clase || '-'}</span>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            setDatabaseStatus('error', 'Error');
            container.innerHTML = `<div class="character-box">No se pudieron cargar personajes: ${error.message}</div>`;
        }
    }

    async function cargarItems() {
        const container = document.getElementById('items-list');
        setDatabaseStatus('wait', 'Consultando...');

        try {
            const response = await fetch('/api/items');
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const items = await response.json();
            setDatabaseStatus('ok', 'Operativa');

            if (items.length === 0) {
                container.innerHTML = '<div class="item-box">No hay items en la tienda.</div>';
                return;
            }

            container.innerHTML = items.map((item) => `
                <div class="item-box">
                    <div class="item-title">
                        <strong>${item.nombre}</strong>
                        <span>${item.precio} oro</span>
                    </div>
                    <div class="item-info">${item.tipo || 'Sin tipo'} / ${item.rareza || 'Sin rareza'}</div>
                    <div class="item-info">${item.descripcion || ''}</div>
                    <button disabled>Comprar no disponible</button>
                </div>
            `).join('');
        } catch (error) {
            setDatabaseStatus('error', 'Error');
            container.innerHTML = `<div class="item-box">No se pudieron cargar items: ${error.message}</div>`;
        }
    }

    document.querySelectorAll('.tab').forEach((tab) => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach((item) => item.classList.remove('active'));
            tab.classList.add('active');

            document.getElementById('habilidades-panel').classList.toggle('hidden', tab.dataset.tab !== 'habilidades');
            document.getElementById('personajes-panel').classList.toggle('hidden', tab.dataset.tab !== 'personajes');
            document.getElementById('tienda-panel').classList.toggle('hidden', tab.dataset.tab !== 'tienda');
        });
    });

    socket.on('connect', () => {
        setStatus(serverStatus, serverStatusText, 'ok', 'Conectado');
        if (dbStatusText.innerText === 'Sin comprobar') {
            setDatabaseStatus('wait', 'Sin comprobar');
        }
    });

    socket.on('disconnect', () => {
        setStatus(serverStatus, serverStatusText, 'error', 'Desconectado');
        setDatabaseStatus('wait', 'Sin comprobar');
    });

    socket.io.on('reconnect_attempt', () => {
        setStatus(serverStatus, serverStatusText, 'wait', 'Reconectando...');
    });

    socket.io.on('reconnect_error', () => {
        setStatus(serverStatus, serverStatusText, 'error', 'Sin respuesta');
    });

    socket.on('status', (data) => {
        document.getElementById('log').innerText = "> " + data.mensaje;
        setDatabaseStatus('ok', data.ok ? 'Operativa' : 'Respondió');
        cargarArbolHabilidades();
    });

    cargarPersonajes();
    cargarItems();
</script>
</body>
</html>
